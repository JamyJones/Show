<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Personal Information Form – Final</title>
<style>
/* ---------- Page background ----------
   The page and the form share the same background so the title looks like it cuts the border. ----------
*/
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:#f4f4f4;           /* page background = form background */
}

/* ---------- Form container ----------
   width: 100% (full page width), 100 % border, sharp corners ----------
*/
.form-container{
  width:100%;
  max-width:700px;              /* optional, keeps layout tidy on wide screens */
  margin:30px auto;
  border:1px solid #000;
  padding:15px;
  background:#f4f4f4;           /* same as page for “cut‑through” look */
  position:relative;
  box-sizing:border-box;
}

/* ---------- Title that overlaps the top border ----------
   Absolutely positioned, placed above the border, same background as page ----------
*/
.form-title{
  position:absolute;
  top:-15px;
  left:15px;
  background:#f4f4f4;
  padding:0 5px;
  font-size:1.5rem;
  font-weight:bold;
}

/* ---------- Image placeholder ----------
   Float right, margin gives space from border ----------
*/
.placeholder{
  float:right;
  margin:0 0 15px 15px;
  border:1px dashed #aaa;
  width:120px;
  height:120px;
  background:#ddd;
  display:block;
}

/* ---------- Field rows ----------
   Each row: label (incl. colon) + input. Inputs use flex‑box to take remaining width. ----------
*/
.field-row{
  display:flex;
  align-items:center;
  margin-bottom:30px;
  gap:10px;
}

.field-row label{
  font-weight:500;
}

.field-row input,
.field-row select{
  flex:0 0 35%;                 /* 50 % of the form width for text inputs */
  padding:5px 8px;
  font-size:1rem;
  border:1px solid #999;
  border-radius:0;
  box-sizing:border-box;
}

/* Colour picker is only 10 % of the form width */
.field-row input[type="color"]{
  flex:0 0 8%;
  padding:0;
}

/* Radio group – only two options (Male / Female) ----------
   Radio buttons and their labels sit on the same line ----------
*/
.radio-group{
  display:flex;
  align-items:center;
}

.radio-group label{
  margin-left:-10px;
}

/* ---------- Address textarea ----------
   Label on top, textarea below, both full width of the form ----------
*/
.address-group{
  margin-bottom:10px;
}
.address-group label{
  display:block;
  margin-bottom:3px;
  font-weight:500;
}
.address-group textarea{
  width:60%;                    /* 80 % of form width */
  height:100px;
  padding:5px 8px;
  font-size:1rem;
  border:1px solid #999;
  border-radius:0;
  resize:vertical;
  box-sizing:border-box;
}

/* ---------- Responsiveness ----------
   On very small screens, stack the label above the input ----------
*/
@media (max-width:480px){
  .field-row{
    flex-direction:column;
    align-items:flex-start;
  }
  .field-row label{margin-bottom:3px;}
}
</style>
</head>
<body>

<div class="form-container">
  <div class="form-title">PERSONAL INFORMATION</div>

  <!-- Image placeholder -->
  <img src="../assets/man.png" alt="man profile" class="placeholder">

  <!-- First name -->
  <div class="field-row">
    <label for="firstName">First name :</label>
    <input type="text" id="firstName" placeholder="First name">
  </div>

  <!-- Last name -->
  <div class="field-row">
    <label for="lastName">Last name :</label>
    <input type="text" id="lastName" placeholder="Last name">
  </div>

  <!-- Gender -->
  <div class="field-row">
    <label for="gender">Gender :</label>
    <div class="radio-group">
      <input type="radio" id="genderMale" name="gender" value="male" checked>
      <label for="genderMale">Male</label>
      <input type="radio" id="genderFemale" name="gender" value="female">
      <label for="genderFemale">Female</label>
    </div>
  </div>

  <!-- Birthday -->
  <div class="field-row">
    <label for="birthday">Birthday :</label>
    <input type="date" id="birthday" placeholder="dd/mm/yyyy">
  </div>

  <!-- Country -->
  <div class="field-row">
    <label for="country">Country :</label>
    <input type="text" id="country" placeholder="Country">
  </div>

  <!-- Email -->
  <div class="field-row">
    <label for="email">Email :</label>
    <input type="email" id="email" placeholder="Email">
  </div>

  <!-- Favourite colour -->
  <div class="field-row">
    <label for="favColour">Select your favourite color :</label>
    <input type="color" id="favColour" value="#ff0000">
  </div>

  <!-- Address -->
  <div class="address-group">
    <label for="address">Address :</label>
    <textarea id="address" placeholder="Enter your address here…"></textarea>
  </div>
</div>

</body>
</html>
