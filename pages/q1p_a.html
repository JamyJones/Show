<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(135deg, #e3e9f7 0%, #ddeef6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", "Roboto", Arial, sans-serif;
        }
        .form-container {
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 6px 24px rgba(60, 100, 150, 0.2);
            padding: 40px 32px 32px 32px;
            width: 470px;
            max-width: 98vw;
        }
        .form-title {
            text-align: center;
            color: #253858;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }
        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 22px;
        }
        .form-label {
            width: 138px;
            margin-right: 10px;
            text-align: right;
            font-weight: 500;
            color: #5076a0;
            font-size: 1rem;
            letter-spacing: 0.2px;
        }
        .form-input {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 6px;
            background: #ecf3fb;
            font-size: 1rem;
            color: #364872;
            box-shadow: 0 2px 7px rgba(60, 100, 150, 0.07) inset;
            transition: box-shadow 0.2s, background 0.2s;
        }
        .form-input:focus {
            outline: none;
            background: #e1eafd;
            box-shadow: 0 0 0 2px #6b9ce8 inset, 0 2px 8px rgba(60,100,150,0.10);
        }
        /* Password inputs slightly shorter */
        input[type="password"] {
            width: 75%;
            min-width: 120px;
            max-width: 210px;
        }
        .button-container {
            display: flex;
            gap: 20px;
            margin-top: 6px;
            margin-left: 148px; /* aligns buttons to left under input fields */
        }
        .material-btn {
            min-width: 82px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(100deg, #3976e9 0%, #3573bc 100%);
            border: none;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(51, 106, 225, 0.18);
            cursor: pointer;
            height: 36px;
            transition: box-shadow 0.18s, background 0.23s;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Remove default padding, align text center */
            padding: 0;
            position: relative;
            overflow: hidden;
        }
        .material-btn.reset {
            background: linear-gradient(100deg, #bbbbbb 0%, #a4a4a4 100%);
            color: #363636;
            box-shadow: 0 2px 8px rgba(120, 120, 120, 0.18);
        }
        .material-btn:active {
            box-shadow: 0 1px 3px rgba(51, 106, 225, 0.16);
        }
        /* Ripple effect for material button */
        .material-btn:after {
            content: '';
            position: absolute;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            left: 50%;
            top: 50%;
            background: rgba(255,255,255,0.3);
            transform: scale(0);
            pointer-events: none;
            transition: transform 0.4s, opacity 0.4s;
            opacity: 0;
        }
        .material-btn:active:after {
            transform: scale(1);
            opacity: 1;
            transition: transform 0.2s, opacity 0.3s;
        }
        /* Responsive for mobile */
        @media (max-width: 600px) {
            .form-container {
                padding: 18px 7px 24px 7px;
                width: 100%;
            }
            .form-label {
                width: 90px;
                font-size: 0.95rem;
            }
            .button-container {
                margin-left: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="form-title">Registration Form</h2>
        <form>
            <div class="form-row">
                <label for="username" class="form-label">Username:</label>
                <input type="text" id="username" name="username" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="password" class="form-label">Password:</label>
                <input type="password" id="password" name="password" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="confirmPassword" class="form-label">Confirm Password:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="firstName" class="form-label">First Name:</label>
                <input type="text" id="firstName" name="firstName" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="lastName" class="form-label">Last Name:</label>
                <input type="text" id="lastName" name="lastName" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="email" class="form-label">Email:</label>
                <input type="email" id="email" name="email" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="phone" class="form-label">Phone No:</label>
                <input type="tel" id="phone" name="phone" class="form-input" required>
            </div>
            <div class="form-row">
                <label for="location" class="form-label">Location:</label>
                <input type="text" id="location" name="location" class="form-input" required>
            </div>
            <div class="button-container">
                <button type="submit" class="material-btn">Save</button>
                <button type="reset" class="material-btn reset">Reset</button>
            </div>
        </form>
    </div>
</body>
</html>
