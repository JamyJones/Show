<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departmental Store Customer Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #e2e8f0;
            margin: 0;
            padding: 0;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-top: 30px;
        }
        form {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            padding: 30px 25px;
            border-radius: 16px;
            margin: 40px auto;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(44,62,80,0.2);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
        }
        input[type="text"],
        input[type="tel"],
        textarea,
        select {
            width: 100%;
            padding: 9px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1em;
            margin-bottom: 2px;
        }
        .days-row {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .days-row label {
            display: inline-block;
            margin-bottom: 0;
            font-weight: normal;
        }
        .days-row input[type="checkbox"] {
            margin-right: 4px;
        }
        .form-group textarea {
            resize: vertical;
        }
        button {
            background-color: #2d9cdb;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-right: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        button[type="reset"] {
            background-color: #e74c3c;
        }
        button:hover {
            opacity: 0.97;
            background-color: #2386c8;
        }
        .small-note {
            font-size: 0.9em;
            color: #2c3e50;
            margin-top: 3px;
        }
    </style>
</head>
<body>
    <h1>Customer Information Form</h1>
    <form action="#" method="post">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Contact Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        
        <div class="form-group">
            <label>Preferred Days of Purchasing:</label>
            <div class="days-row">
                <label><input type="checkbox" name="preferred_days" value="Monday">Monday</label>
                <label><input type="checkbox" name="preferred_days" value="Tuesday">Tuesday</label>
                <label><input type="checkbox" name="preferred_days" value="Wednesday">Wednesday</label>
                <label><input type="checkbox" name="preferred_days" value="Thursday">Thursday</label>
                <label><input type="checkbox" name="preferred_days" value="Friday">Friday</label>
                <label><input type="checkbox" name="preferred_days" value="Saturday">Saturday</label>
                <label><input type="checkbox" name="preferred_days" value="Sunday">Sunday</label>
            </div>
        </div>
        
        <div class="form-group">
            <label for="favorite_items">Favorite Items:</label>
            <select id="favorite_items" name="favorite_items[]" multiple size="6">
                <option value="groceries">Groceries</option>
                <option value="dairy">Dairy Products</option>
                <option value="bakery">Bakery Items</option>
                <option value="fruits">Fresh Fruits</option>
                <option value="vegetables">Fresh Vegetables</option>
                <option value="meat">Meat & Poultry</option>
                <option value="frozen">Frozen Foods</option>
                <option value="beverages">Beverages</option>
                <option value="snacks">Snacks & Chips</option>
                <option value="personal_care">Personal Care</option>
                <option value="household">Household Items</option>
            </select>
            <div class="small-note">(Hold Ctrl/Cmd or Shift to select multiple items)</div>
        </div>
        
        <div class="form-group">
            <label for="suggestions">Suggestions or Feedback:</label>
            <textarea id="suggestions" name="suggestions" rows="4"></textarea>
        </div>
        
        <div class="form-group">
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </div>
    </form>
</body>
</html>
