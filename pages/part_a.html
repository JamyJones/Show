<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0;
            text-align: start;
            vertical-align: top;
            width: 25%;
            box-sizing: border-box;
        }
        th {
            height: 60px;
        }
        td {
            height: 60px;
        }
        /* Make the 5th row taller */
        tr:nth-child(5) th,
        tr:nth-child(5) td {
            height: 100px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td>Class</td>
            <td>Number of students</td>
            <td>Number of units</td>
            <td>Name of class rep</td>
        </tr>
        <tr>
            <td>DIT</td>
            <td>10</td>
            <td>6</td>
            <td>JOHN KAMAU</td>
        </tr>
        <tr>
            <td>CIT</td>
            <td>15</td>
            <td>8</td>
            <td>DOREEN NKATHA</td>
        </tr>
        <tr>
            <td>DICT</td>
            <td>8</td>
            <td>8</td>
            <td>CLINTO ONDUSO</td>
        </tr>
        <tr>
            <td>DBA</td>
            <td>33</td>
            <td>7</td>
            <td>ROSEMARY KATHURE</td>
        </tr>
    </table>
</body>
</html>
