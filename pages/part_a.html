<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Table</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 0;
            text-align: center;
            vertical-align: middle;
            width: 25%;
            box-sizing: border-box;
        }
        th {
            height: 60px;
        }
        td {
            height: 60px;
        }
        /* Make the 5th row taller */
        tr:nth-child(5) th,
        tr:nth-child(5) td {
            height: 100px;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>class</th>
            <th>Number of students</th>
            <th>Number of units</th>
            <th>Name of class rep</th>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
</body>
</html>
